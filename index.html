function ChatWidget() {
const [open,setOpen]=useState(false);
const [msgs,setMsgs]=useState([{role:“bot”,text:“Hey! I’m the CCC AI assistant — ask me anything about pricing, content, downloads, or how it all works. I’ve got you covered 24/7.”}]);
const [input,setInput]=useState(””);
const [loading,setLoading]=useState(false);
const bottomRef=useRef(null);

useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:“smooth”})},[msgs,loading]);

async function send(){
const msg=input.trim();
if(!msg||loading)return;
setInput(””);
const next=[…msgs,{role:“user”,text:msg}];
setMsgs(next);
setLoading(true);
try{
const history=next.map(m=>({role:m.role===“bot”?“assistant”:“user”,content:m.text}));
const res=await fetch(“https://api.anthropic.com/v1/messages”,{
method:“POST”,
headers:{“Content-Type”:“application/json”,“anthropic-version”:“2023-06-01”,“anthropic-dangerous-direct-browser-access”:“true”},
body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:1000,system:SYSTEM,messages:history})
});
if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${res.status}`);}
const data=await res.json();
setMsgs(prev=>[…prev,{role:“bot”,text:data?.content?.[0]?.text||“Got your message! Can you give me more detail?”}]);
}catch(e){
setMsgs(prev=>[…prev,{role:“bot”,text:`Error: ${e.message}. Please try again.`}]);
}
setLoading(false);
}

return (
<div style={{position:“fixed”,bottom:“1.5rem”,right:“1.5rem”,zIndex:9000}}>
{open&&(
<div style={{position:“absolute”,bottom:72,right:0,width:“min(360px,calc(100vw - 2rem))”,background:C.dark,border:`1px solid rgba(192,57,43,0.35)`,borderRadius:14,boxShadow:“0 24px 64px rgba(0,0,0,0.7)”,display:“flex”,flexDirection:“column”,maxHeight:“70vh”,overflow:“hidden”}}>

AI — Online 24/7
</div>
</div>
<button onClick={()=>setOpen(false)} style={{background:“rgba(0,0,0,0.2)”,border:“none”,color:“white”,width:28,height:28,borderRadius:“50%”,cursor:“pointer”,fontSize:“0.85rem”,display:“flex”,alignItems:“center”,justifyContent:“center”}}>✕</button>
</div>
<div style={{flex:1,overflowY:“auto”,padding:“1rem”,display:“flex”,flexDirection:“column”,gap:“0.65rem”}}>
{msgs.map((m,i)=>(
<div key={i} style={{display:“flex”,flexDirection:m.role===“user”?“row-reverse”:“row”,gap:“0.5rem”,alignItems:“flex-end”}}>
{m.role===“bot”&&<div style={{width:24,height:24,background:C.redLight,borderRadius:“50%”,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:“0.65rem”,flexShrink:0}}>⚡</div>}
<div style={{maxWidth:“76%”,padding:“0.65rem 0.9rem”,borderRadius:12,fontSize:“0.83rem”,lineHeight:1.55,background:m.role===“bot”?“rgba(255,255,255,0.07)”:C.red,color:“rgba(255,255,255,0.92)”,borderBottomLeftRadius:m.role===“bot”?3:12,borderBottomRightRadius:m.role===“user”?3:12,whiteSpace:“pre-wrap”}}>{m.text}</div>
</div>

{loading&&(
