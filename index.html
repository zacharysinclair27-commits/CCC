<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counter Culture Curriculum — Christ-Centered and Relevant</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:#0C0C0C;color:#fff;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#141414}
::-webkit-scrollbar-thumb{background:#C0392B;border-radius:3px}
nav{position:sticky;top:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:.9rem 2.5rem;background:rgba(12,12,12,.95);border-bottom:1px solid rgba(192,57,43,.2);backdrop-filter:blur(12px);gap:1rem}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.04em}
.nav-logo span{color:#C0392B}
.nav-links{display:flex;gap:1.8rem;align-items:center}
.nav-links a{color:rgba(255,255,255,.55);font-size:.83rem;font-weight:500;transition:color .2s}
.nav-links a:hover{color:#fff}
.btn-red{background:#C0392B;color:#fff;border:none;padding:.55rem 1.2rem;border-radius:3px;font-weight:700;font-size:.8rem;letter-spacing:.06em;text-transform:uppercase;transition:all .2s}
.btn-red:hover{background:#922b21;transform:translateY(-2px)}
.hero{min-height:92vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:6rem 2rem 4rem;background:radial-gradient(ellipse 90% 55% at 50% -5%,rgba(192,57,43,.22) 0%,transparent 65%),#0C0C0C;position:relative;overflow:hidden}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(192,57,43,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(192,57,43,.05) 1px,transparent 1px);background-size:55px 55px;pointer-events:none}
.hero-inner{max-width:880px;position:relative;z-index:1;animation:fadeUp .6s ease}
.hero-badge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(192,57,43,.14);border:1px solid rgba(192,57,43,.4);color:#D4A017;font-size:.68rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;padding:.4rem 1rem;border-radius:2px;margin-bottom:1.5rem}
.hero-tagline{font-style:italic;font-size:1.55rem;color:rgba(255,255,255,.45);margin-bottom:.6rem}
.hero-tagline strong{color:#D4A017;font-style:normal}
.hero-sub{font-size:1rem;color:rgba(255,255,255,.38);margin-bottom:2.5rem;line-height:1.6}
.hero-btns{display:flex;gap:.9rem;justify-content:center;flex-wrap:wrap}
.btn-hero{background:#C0392B;color:#fff;border:none;padding:1rem 2.2rem;border-radius:3px;font-weight:700;font-size:.95rem;letter-spacing:.06em;text-transform:uppercase;transition:all .2s}
.btn-hero:hover{background:#922b21;transform:translateY(-2px)}
.btn-ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.1);padding:1rem 2.2rem;border-radius:3px;font-size:.95rem;display:inline-block;transition:border-color .2s}
.btn-ghost:hover{border-color:rgba(255,255,255,.4)}
.hero-note{font-size:.72rem;color:rgba(255,255,255,.28);margin-top:1rem}
.hero-stats{display:flex;gap:3.5rem;justify-content:center;margin-top:4rem;padding-top:3rem;border-top:1px solid rgba(255,255,255,.1);flex-wrap:wrap}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;color:#C0392B;line-height:1}
.stat-label{font-size:.68rem;color:rgba(255,255,255,.36);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
section{padding:6rem 2rem}
.section-inner{max-width:1040px;margin:0 auto}
.section-label{font-size:.7rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#C0392B;margin-bottom:.8rem}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,5vw,4rem);line-height:1;margin-bottom:1rem}
.section-sub{font-size:1rem;color:rgba(255,255,255,.55);line-height:1.7;margin-bottom:3rem;max-width:640px}
.problem{background:#111}
.problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:center}
.pain-list{display:flex;flex-direction:column;gap:.7rem}
.pain-item{border-left:3px solid #C0392B;padding:.9rem 1.2rem;background:rgba(192,57,43,.12);font-size:.88rem;color:rgba(255,255,255,.68);line-height:1.55;border-radius:0 5px 5px 0}
.stat-box{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.2);border-radius:10px;padding:3rem;text-align:center}
.big-num{font-family:'Bebas Neue',sans-serif;font-size:5.5rem;color:#C0392B;line-height:1}
.big-num-sub{font-size:1rem;color:rgba(255,255,255,.55);margin-bottom:1.8rem;line-height:1.5}
.divider{width:40%;height:1px;background:rgba(255,255,255,.1);margin:0 auto 1.8rem}
.small-num{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;color:#D4A017;line-height:1}
.small-num-sub{font-size:.9rem;color:rgba(255,255,255,.4);margin-top:6px}
.features{background:#141414}
.features-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.feature-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:1.4rem 1.2rem;transition:all .25s}
.feature-card:hover{border-color:rgba(192,57,43,.35);transform:translateY(-3px)}
.feature-icon{font-size:1.5rem;margin-bottom:.6rem}
.feature-title{font-weight:700;font-size:.88rem;margin-bottom:.4rem;line-height:1.3}
.feature-desc{font-size:.78rem;color:rgba(255,255,255,.55);line-height:1.6}
.themes{background:#0C0C0C}
.themes-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden}
.theme-cell{padding:1.2rem;border-right:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.1);transition:background .2s}
.theme-cell:hover{background:rgba(192,57,43,.1)}
.theme-cell.alt{background:rgba(192,57,43,.12)}
.theme-month{font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#C0392B;margin-bottom:.35rem}
.theme-name{font-weight:800;font-size:.95rem;margin-bottom:.25rem;line-height:1.2}
.theme-sub{font-size:.72rem;color:rgba(255,255,255,.38)}
.pricing{background:#141414}
.pricing-banner{background:linear-gradient(135deg,rgba(192,57,43,.15),rgba(212,160,23,.1));border:1px solid rgba(212,160,23,.3);border-radius:8px;padding:1.4rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:2.5rem}
.pricing-banner h3{font-weight:800;font-size:1.3rem;color:#D4A017;margin-bottom:.25rem}
.pricing-banner p{font-size:.83rem;color:rgba(255,255,255,.55)}
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.price-card{border:1px solid rgba(255,255,255,.1);border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
.price-card.featured{border:2px solid #C0392B}
.price-badge{background:#C0392B;padding:.4rem;text-align:center;font-size:.68rem;font-weight:700;letter-spacing:.1em}
.price-header{padding:1.6rem;border-bottom:1px solid rgba(255,255,255,.1)}
.price-header.featured{background:rgba(192,57,43,.12)}
.price-name{font-weight:800;font-size:1rem;margin-bottom:.5rem}
.price-amount{font-weight:900;font-size:2.4rem;line-height:1}
.price-period{font-size:.85rem;color:rgba(255,255,255,.55);font-weight:400}
.price-desc{font-size:.8rem;color:rgba(255,255,255,.55);margin-top:.5rem;line-height:1.5}
.price-features{padding:1.2rem 1.6rem;flex:1}
.price-feature{font-size:.83rem;color:rgba(255,255,255,.68);display:flex;gap:.65rem;margin-bottom:.55rem;line-height:1.4;align-items:flex-start}
.price-feature span{color:#D4A017;margin-top:1px}
.price-footer{padding:1rem 1.6rem 1.6rem}
.price-footer button{width:100%;padding:.85rem;border:none;border-radius:4px;font-weight:700;font-size:.88rem;letter-spacing:.05em;text-transform:uppercase;transition:all .2s}
.btn-gold{background:#D4A017;color:#0C0C0C}
.btn-gold:hover{background:#b8880f}
.btn-dim{background:rgba(255,255,255,.1);color:#fff}
.btn-dim:hover{background:rgba(255,255,255,.18)}
.pricing-footer{text-align:center;margin-top:1.8rem;font-size:.8rem;color:rgba(255,255,255,.38);padding:1rem 1.5rem;background:rgba(212,160,23,.04);border:1px solid rgba(212,160,23,.1);border-radius:6px}
.pricing-footer strong{color:#D4A017}
.testimonials{background:#0C0C0C}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:2.5rem}
.testi-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:1.8rem;position:relative}
.testi-quote{font-family:Georgia,serif;font-size:4.5rem;color:#C0392B;opacity:.25;line-height:1;position:absolute;top:.3rem;left:1.2rem}
.testi-text{font-style:italic;font-size:.88rem;color:rgba(255,255,255,.72);line-height:1.75;margin-bottom:1.2rem;padding-top:1.5rem}
.testi-name{font-size:.76rem;color:rgba(255,255,255,.38)}
.testi-name strong{color:#D4A017}
.cta-section{background:linear-gradient(135deg,#922b21,#C0392B);padding:5rem 2rem;text-align:center}
.cta-title{font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1.05;margin-bottom:1rem}
.cta-sub{font-size:1rem;color:rgba(255,255,255,.75);line-height:1.7;margin-bottom:2.5rem}
.btn-white{background:#fff;color:#C0392B;border:none;padding:1rem 2.5rem;border-radius:4px;font-weight:900;font-size:1rem;letter-spacing:.06em;text-transform:uppercase;transition:transform .2s}
.btn-white:hover{transform:translateY(-2px)}
footer{background:#1C1C1C;border-top:1px solid rgba(255,255,255,.1);padding:2.5rem 1.5rem;text-align:center}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.05em;margin-bottom:.4rem}
.footer-logo span{color:#C0392B}
.footer-tagline{font-style:italic;color:#D4A017;margin-bottom:1.4rem;font-size:.95rem}
.footer-links{display:flex;gap:1.8rem;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap}
.footer-links a{color:rgba(255,255,255,.38);font-size:.78rem}
.footer-copy{font-size:.7rem;color:rgba(255,255,255,.18)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);z-index:8000;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal-box{background:#141414;border:1px solid rgba(192,57,43,.4);border-radius:14px;max-width:500px;width:100%;overflow:hidden;animation:fadeUp .25s ease}
.modal-header{background:linear-gradient(135deg,#922b21,#C0392B);padding:1.8rem 2rem;text-align:center;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;background:rgba(0,0,0,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.9rem}
.modal-title{font-weight:900;font-size:1.8rem;letter-spacing:.04em}
.modal-sub{font-size:.85rem;color:rgba(255,255,255,.7);margin-top:4px}
.modal-body{padding:1.8rem 2rem}
.modal-price-row{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:1rem 1.4rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center}
.modal-price-label{font-weight:600}
.modal-price-amount{font-weight:900;font-size:1.8rem;color:#D4A017}
.modal-step{display:flex;gap:.9rem;margin-bottom:.7rem;font-size:.85rem;color:rgba(255,255,255,.55);line-height:1.5;align-items:flex-start}
